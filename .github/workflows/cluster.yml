name: Cluster articles

on:
  schedule:
    - cron: "0 */6 * * *"   # every 6 hours
  workflow_dispatch:          # allow manual trigger from GitHub Actions UI

jobs:
  cluster:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger cluster phase
        run: |
          HTTP_STATUS=$(curl -s -o /tmp/cluster_response.json -w "%{http_code}" -X POST \
            --max-time 120 \
            "${{ secrets.SUPABASE_URL }}/functions/v1/ingest-articles?phase=cluster" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            -H "Content-Type: application/json" \
            --data '{}')
          echo "HTTP status: $HTTP_STATUS"
          cat /tmp/cluster_response.json
          if [ "$HTTP_STATUS" -lt 200 ] || [ "$HTTP_STATUS" -ge 300 ]; then
            echo "::error::Cluster edge function returned HTTP $HTTP_STATUS"
            exit 1
          fi

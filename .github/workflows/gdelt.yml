name: GDELT ingest

on:
  schedule:
    - cron: "*/30 * * * *"   # every 30 minutes, same cadence as RSS ingest
  workflow_dispatch:           # allow manual trigger

jobs:
  gdelt:
    runs-on: ubuntu-latest
    steps:
      - name: Ingest from GDELT
        run: |
          HTTP_STATUS=$(curl -s -o /tmp/gdelt_response.json -w "%{http_code}" -X POST \
            --max-time 120 \
            "${{ secrets.SUPABASE_URL }}/functions/v1/ingest-articles?phase=ingest_gdelt" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            -H "Content-Type: application/json" \
            --data '{}')
          echo "HTTP status: $HTTP_STATUS"
          cat /tmp/gdelt_response.json
          if [ "$HTTP_STATUS" -lt 200 ] || [ "$HTTP_STATUS" -ge 300 ]; then
            echo "::error::GDELT ingest returned HTTP $HTTP_STATUS"
            exit 1
          fi

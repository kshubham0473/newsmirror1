name: NewsMirror ingest

on:
  schedule:
    # Fetch new articles every 30 mins
    - cron: '*/30 * * * *'
  workflow_dispatch: # allows manual trigger from GitHub UI

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch new articles
        run: |
          curl -s -X POST \
            "${{ secrets.SUPABASE_URL }}/functions/v1/ingest-articles?phase=ingest" \

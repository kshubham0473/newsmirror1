name: NewsMirror ingest

on:
  schedule:
    # Fetch new articles every 30 minutes
    - cron: '*/30 * * * *'
  workflow_dispatch: # allows manual trigger from GitHub UI

permissions:
  issues: write

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch new articles
        id: ingest_call
        run: |
          HTTP_STATUS=$(curl -s -o /tmp/ingest_response.json -w "%{http_code}" -X POST \
            --max-time 145 \
            "${{ secrets.SUPABASE_URL }}/functions/v1/ingest-articles?phase=ingest" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            -H "Content-Type: application/json" \
            --data '{}')
          echo "HTTP status: $HTTP_STATUS"
          cat /tmp/ingest_response.json
          if [ "$HTTP_STATUS" -lt 200 ] || [ "$HTTP_STATUS" -ge 300 ]; then
            echo "::error::Ingest edge function returned HTTP $HTTP_STATUS"
            exit 1
          fi

      - name: Alert on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const title = `\u{1F6A8} Ingest workflow failed \u2014 ${new Date().toISOString().slice(0,16).replace('T',' ')} UTC`;
            const body = [
              '**Workflow:** NewsMirror ingest',
              `**Run:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}`,
              '',
              'The ingest edge function returned a non-2xx response or the curl call failed.',
              '',
              '**Checklist**',
              '- [ ] Check Supabase Edge Function logs (`ingest-articles`)',
              '- [ ] Verify `SUPABASE_URL` and `SUPABASE_SERVICE_ROLE_KEY` secrets are set',
              '- [ ] Check RSS source reachability',
              '- [ ] See `docs/ops-runbook.md` for full triage steps',
            ].join('\n');
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['ops', 'alert'],
            });
